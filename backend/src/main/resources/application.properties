# 1. Cấu hình Server
server.port=8080
# Lắng nghe mọi interface để máy khác trong cùng mạng (LAN) truy cập được
server.address=0.0.0.0
# Cho phép request xếp TKB chạy lâu (GA có thể mất vài phút)
server.tomcat.connection-timeout=600000

# 2. Cấu hình Database (Kết nối tới service "database" trong compose.yaml)
spring.datasource.url=jdbc:postgresql://database:5432/timetablex_db
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Cấu hình JPA / Hibernate
# Tự động cập nhật schema database khi sửa code Java (Entity)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Tắt open-in-view để tránh query trong view (best practice) và bỏ WARN khi khởi động
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Ca tối: tiết bắt đầu từ đây trở đi được coi là ca tối (chỉ ONLINE_ELEARNING, ONLINE_COURSERA)
timetable.evening-shift.start-period-from=13
# Thêm nhận diện ca tối theo TÊN ca (tên Shift chứa chuỗi này), cách nhau bởi dấu phẩy — vd. Ca 5 = ca tối, chỉ xếp phòng ONLINE
timetable.evening-shift.name-markers=Ca 5

# Thuật toán GA: giới hạn thời gian (ms) và số thế hệ tối đa (tránh hardcode trong code)
timetable.ga.max-runtime-ms=240000
timetable.ga.max-generations=500

# Quy chế đào tạo (xếp TKB): 1 giờ định mức = 50 phút; khối lượng theo tín chỉ → giờ/tuần; khung giờ giảng
timetable.regulation.max-weekly-hours=15
timetable.regulation.max-daily-hours=4
timetable.regulation.teaching-window-start=06:00
timetable.regulation.teaching-window-end=20:00
# Gộp tải theo lớp biên chế (sinh viên) khi có liên kết lớp HP ↔ lớp biên chế
timetable.regulation.enforce-student-workload=true